version: "3.8"

services:
  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: promptmeter
      POSTGRES_PASSWORD: promptmeter
      POSTGRES_DB: promptmeter
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promptmeter"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:26.3
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: promptmeter
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_PASSWORD: promptmeter
    volumes:
      - ch_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--password", "promptmeter", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.12-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    ports:
      - "9001:9000"
      - "9002:9001"
    environment:
      MINIO_ROOT_USER: promptmeter
      MINIO_ROOT_PASSWORD: promptmeter
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 promptmeter promptmeter;
      mc mb --ignore-existing local/promptmeter-prompts;
      exit 0;
      "

  ingestion-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.ingestion
    ports:
      - "8443:8443"
    environment:
      INGESTION_PORT: "8443"
      PG_URL: postgres://promptmeter:promptmeter@postgres:5432/promptmeter?sslmode=disable
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      DEPLOYMENT_MODE: self-hosted
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
    environment:
      PG_URL: postgres://promptmeter:promptmeter@postgres:5432/promptmeter?sslmode=disable
      CH_URL: clickhouse://default:promptmeter@clickhouse:9000/promptmeter
      NATS_URL: nats://nats:4222
      S3_ENDPOINT: minio:9000
      S3_BUCKET: promptmeter-prompts
      S3_ACCESS_KEY: promptmeter
      S3_SECRET_KEY: promptmeter
      S3_USE_SSL: "false"
      BATCH_SIZE: "10000"
      FLUSH_INTERVAL: 5s
      WORKER_COUNT: "3"
      PRICE_REFRESH_INTERVAL: 5m
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  dashboard-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.dashboard
    ports:
      - "8080:8080"
    environment:
      DASHBOARD_PORT: "8080"
      PG_URL: postgres://promptmeter:promptmeter@postgres:5432/promptmeter?sslmode=disable
      CH_URL: clickhouse://default:promptmeter@clickhouse:9000/promptmeter
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production
      COOKIE_DOMAIN: localhost
      CORS_ORIGINS: http://localhost:3000
      AUTH_MODE: autologin
      DEPLOYMENT_MODE: self-hosted
      INTERNAL_SECRET: dev-internal-secret
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  dashboard-ui:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.dashboard-ui
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - dashboard-api
    profiles: ["full"]
    restart: unless-stopped

volumes:
  pg_data:
  ch_data:
  redis_data:
  minio_data:
